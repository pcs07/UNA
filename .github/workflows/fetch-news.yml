name: Fetch Daily UPSC News

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC
    - cron: '30 0 * * *'
  workflow_dispatch:          # allow manual trigger from GitHub UI

permissions:
  contents: write             # allow pushing data/news.json

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          if git diff --cached --quiet; then
            echo "No new articles — nothing to commit."
          else
            ARTICLE_COUNT=$(python -c "import json; d=json.load(open('data/news.json')); print(d['total'])")
            git commit -m "chore: update news — ${ARTICLE_COUNT} articles [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
